name: Deploy Preview to GitHub Pages

# Preview deploy for the vertical-obstacle routing fix (情境 E).
# Builds main → /FlowSprite/, this branch → /FlowSprite/preview-routing-fix/.
# Delete this file when the feature merges into main.

on:
  push:
    branches:
      - claude/preview-vertical-obstacle-fix
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main (baseline)
        uses: actions/checkout@v4
        with:
          ref: main
          path: main-source

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: main-source/package-lock.json

      - name: Install + build main
        working-directory: main-source
        run: npm install && npm run build

      - name: Checkout preview branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          path: preview-source

      - name: Install + build preview at sub-path
        working-directory: preview-source
        env:
          VITE_BASE_PATH: /FlowSprite/preview-routing-fix/
        run: npm install && npm run build

      - name: Combine into single dist
        run: |
          mkdir -p combined-dist
          cp -r main-source/dist/. combined-dist/
          mkdir -p combined-dist/preview-routing-fix
          cp -r preview-source/dist/. combined-dist/preview-routing-fix/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: combined-dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
