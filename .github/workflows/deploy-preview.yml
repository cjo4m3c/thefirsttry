name: Deploy Preview to GitHub Pages

# Triggers ONLY on push to the drawer-experiment branch. Builds main as the
# baseline and the experiment branch into a /preview-drawer/ sub-path, then
# deploys both together so:
#   https://cjo4m3c.github.io/FlowSprite/             → main (stable)
#   https://cjo4m3c.github.io/FlowSprite/preview-drawer/ → this experiment
#
# main's own deploy.yml is untouched. If main pushes during a preview window,
# the preview-drawer/ sub-path disappears until the next push to this branch.
on:
  push:
    branches:
      - claude/drawer-experiment
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main (baseline)
        uses: actions/checkout@v4
        with:
          ref: main
          path: main-source

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: main-source/package-lock.json

      - name: Install dependencies (main)
        working-directory: main-source
        run: npm install

      - name: Build main
        working-directory: main-source
        run: npm run build

      - name: Checkout preview branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          path: preview-source

      - name: Install dependencies (preview)
        working-directory: preview-source
        run: npm install

      - name: Build preview at sub-path
        working-directory: preview-source
        env:
          VITE_BASE_PATH: /FlowSprite/preview-drawer/
        run: npm run build

      - name: Combine into single dist
        run: |
          mkdir -p combined-dist
          cp -r main-source/dist/. combined-dist/
          mkdir -p combined-dist/preview-drawer
          cp -r preview-source/dist/. combined-dist/preview-drawer/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: combined-dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
