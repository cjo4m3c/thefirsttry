name: Deploy A* POC to GitHub Pages

# 2 個版本一起 deploy：
#   /FlowSprite/             ← main (sync layout, rule-based phase 1~3f)
#   /FlowSprite/test-astar/  ← 戊 A* (自家 grid-based router，未來取代 main)
#
# 早期的 ELK 系列試驗（甲 V1 / 乙 Deep-A / 丙 Deep-B）已於 2026-05-13 砍除。

on:
  push:
    branches:
      - claude/test-link-open-source-kKqHk
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main (baseline)
        uses: actions/checkout@v4
        with:
          ref: main
          path: main-source

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: main-source/package-lock.json

      - name: Install + build main
        working-directory: main-source
        run: npm install && npm run build

      - name: Checkout A* branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          path: astar-source

      - name: Install A* dependencies
        working-directory: astar-source
        run: npm install

      - name: Build A* router (test-astar)
        working-directory: astar-source
        env:
          VITE_BASE_PATH: /FlowSprite/test-astar/
          VITE_ROUTER: astar
        run: rm -rf dist && npm run build && mv dist dist-astar

      - name: Combine into single dist
        run: |
          mkdir -p combined-dist
          cp -r main-source/dist/. combined-dist/
          mkdir -p combined-dist/test-astar
          cp -r astar-source/dist-astar/. combined-dist/test-astar/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: combined-dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
